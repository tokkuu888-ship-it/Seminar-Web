services:
  - type: web
    name: seminar-platform-frontend
    env: node
    buildCommand: npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://seminar-platform-backend.onrender.com/api/v1
      - key: VITE_APP_NAME
        value: PhD Seminar Platform
